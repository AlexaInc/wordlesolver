<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordSolve AI | Interactive Solver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6aaa64;
            --secondary: #c9b458;
            --dark: #121213;
            --gray: #3a3a3c;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --text: #f8fafc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .background-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(106, 170, 100, 0.2) 0%, transparent 70%);
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #6aaa64, #c9b458, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .solver-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .solver-container {
                grid-template-columns: 1fr;
            }
        }

        .setup-row {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
            justify-content: center;
        }

        .length-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            font-weight: 600;
        }

        .length-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .reset-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
            align-items: center;
        }

        .word-row {
            display: flex;
            gap: 8px;
        }

        .tile {
            width: 58px;
            height: 58px;
            border: 2px solid var(--gray);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
        }

        .tile.active-input {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .tile.G {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .tile.Y {
            background-color: var(--secondary);
            border-color: var(--secondary);
        }

        .tile.R {
            background-color: var(--gray);
            border-color: var(--gray);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .submit-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .side-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 30px;
            height: fit-content;
        }

        .suggestion-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            cursor: copy;
        }

        .suggestion-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .suggestion-word {
            font-family: 'Inter', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .best-guess-label {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border-radius: 100px;
            font-size: 0.8rem;
        }

        .footer {
            padding: 40px;
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Keyboard Support Visual */
        #hidden-input {
            position: absolute;
            top: -1000px;
            opacity: 0;
        }
    </style>
</head>

<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <header>
        <h1>WordSolve AI</h1>
    </header>

    <main>
        <div class="setup-row">
            <button class="length-btn active" data-len="4">4 Letters</button>
            <button class="length-btn active" data-len="5">5 Letters</button>
            <button class="length-btn active" data-len="6">6 Letters</button>
            <button class="reset-btn" id="reset-trigger">Reset Session</button>
        </div>

        <div class="solver-container">
            <div class="main-panel">
                <div class="grid-container" id="game-grid">
                    <!-- Rows will be injected here -->
                </div>

                <div class="controls">
                    <button class="submit-btn" id="submit-guess" disabled>Process Guess</button>
                    <button class="length-btn" id="toggle-bulk"
                        style="background: rgba(59, 130, 246, 0.1); color: var(--accent); border-color: rgba(59, 130, 246, 0.2);">Bulk
                        Paste</button>
                </div>

                <div id="bulk-area" style="display: none; margin-top: 20px; text-align: left;">
                    <textarea id="bulk-input" placeholder="Paste your Wordle or Wordseek results here..."
                        style="width: 100%; height: 120px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; padding: 12px; font-family: 'Inter', sans-serif; resize: none; margin-bottom: 10px;"></textarea>
                    <button class="submit-btn" id="submit-bulk" style="width: 100%;">Analyze Pasted Results</button>
                </div>

                <p style="text-align: center; color: #64748b; font-size: 0.85rem; margin-top: 20px;">
                    Type to enter letters • Click tiles to change color (Grey/Yellow/Green)
                </p>

                <div style="margin-top: 40px; text-align: center;">
                    <span class="status-badge">
                        <span
                            style="display: block; width: 6px; height: 6px; background: #4ade80; border-radius: 50%;"></span>
                        Telegram Bot Connected
                    </span>
                </div>
            </div>

            <div class="side-panel">
                <div class="stats">
                    <span>Possible Words</span>
                    <span id="remaining-count">0</span>
                </div>
                <h3 style="margin: 0 0 15px 0;">Suggestions</h3>
                <ul class="suggestion-list" id="suggestions">
                    <li style="color: #64748b; font-size: 0.9rem; text-align: center; padding: 20px;">
                        Start by choosing a length and entering your first guess.
                    </li>
                </ul>
            </div>
        </div>
    </main>

    <input type="text" id="hidden-input" maxlength="6">

    <footer class="footer">
        &copy; 2026 WordSolve AI. Powered by Telegram Wordle Solver.
    </footer>

    <script>
        let currentLength = 5;
        let guesses = []; // { word, result: 'GRRRR' }
        let currentWordInput = "";
        let currentResultInput = ""; // GYR
        let sessionId = Math.random().toString(36).substring(7);

        const grid = document.getElementById('game-grid');
        const submitBtn = document.getElementById('submit-guess');
        const hiddenInput = document.getElementById('hidden-input');
        const remCount = document.getElementById('remaining-count');
        const sugList = document.getElementById('suggestions');

        function init() {
            setLength(5);

            document.querySelectorAll('.length-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const len = parseInt(btn.getAttribute('data-len'));
                    if (guesses.length > 0) {
                        if (!confirm("Changing length will reset your current game. Continue?")) return;
                    }
                    setLength(len);
                });
            });

            document.getElementById('reset-trigger').addEventListener('click', resetSolver);

            submitBtn.addEventListener('click', submitGuess);

            // Bulk Paste Toggle
            document.getElementById('toggle-bulk').addEventListener('click', () => {
                const area = document.getElementById('bulk-area');
                area.style.display = area.style.display === 'none' ? 'block' : 'none';
            });

            document.getElementById('submit-bulk').addEventListener('click', async () => {
                const text = document.getElementById('bulk-input').value;
                if (!text.trim()) return;

                const res = await fetch('/api/bulk-guess', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, text })
                });

                const data = await res.json();
                if (data.success) {
                    guesses = data.guesses;
                    document.getElementById('bulk-input').value = "";
                    document.getElementById('bulk-area').style.display = 'none';
                    updateUIState(data);
                    render();
                } else {
                    alert("No valid guesses found in the pasted text.");
                }
            });

            // Handle Input
            document.addEventListener('keydown', (e) => {
                if (e.key === "Backspace") {
                    currentWordInput = currentWordInput.slice(0, -1);
                    currentResultInput = currentResultInput.slice(0, -1);
                    render();
                } else if (e.key === "Enter" && !submitBtn.disabled) {
                    submitGuess();
                } else if (/^[a-zA-Z]$/.test(e.key)) {
                    if (currentWordInput.length < currentLength) {
                        currentWordInput += e.key.toUpperCase();
                        currentResultInput += "R"; // Default to Gray
                        render();
                    }
                }
            });

            // Focus helper
            document.body.addEventListener('click', (e) => {
                if (!e.target.closest('.tile')) hiddenInput.focus();
            });
            hiddenInput.focus();
        }

        function setLength(len) {
            currentLength = len;
            document.querySelectorAll('.length-btn').forEach(b => {
                b.classList.toggle('active', parseInt(b.getAttribute('data-len')) === len);
            });
            resetSolver();
        }

        function resetSolver() {
            guesses = [];
            currentWordInput = "";
            currentResultInput = "";

            fetch('/api/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId })
            });

            fetch('/api/init', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, length: currentLength })
            }).then(() => {
                updateUIState({ remainingCount: '?', suggestions: [] });
            });

            render();
        }

        function toggleTileColor(index) {
            const colors = ['R', 'Y', 'G'];
            let current = currentResultInput[index];
            let nextIndex = (colors.indexOf(current) + 1) % colors.length;
            let arr = currentResultInput.split('');
            arr[index] = colors[nextIndex];
            currentResultInput = arr.join('');
            render();
        }

        function render() {
            grid.innerHTML = "";

            // Previous guesses
            guesses.forEach(g => {
                const row = document.createElement('div');
                row.className = 'word-row';
                for (let i = 0; i < currentLength; i++) {
                    const tile = document.createElement('div');
                    tile.className = `tile ${g.result[i]}`;
                    tile.textContent = g.word[i];
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            });

            // Current input row
            const activeRow = document.createElement('div');
            activeRow.className = 'word-row';
            for (let i = 0; i < currentLength; i++) {
                const tile = document.createElement('div');
                const char = currentWordInput[i] || "";
                const res = currentResultInput[i] || "";
                tile.className = `tile ${res}`;
                if (i === currentWordInput.length) tile.classList.add('active-input');
                tile.textContent = char;
                tile.onclick = () => char && toggleTileColor(i);
                activeRow.appendChild(tile);
            }
            grid.appendChild(activeRow);

            submitBtn.disabled = currentWordInput.length !== currentLength;
        }

        async function submitGuess() {
            if (currentWordInput.length !== currentLength) return;

            const res = await fetch('/api/guess', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sessionId,
                    guess: currentWordInput,
                    result: currentResultInput
                })
            });

            const data = await res.json();
            if (data.success) {
                guesses.push({ word: currentWordInput, result: currentResultInput });
                currentWordInput = "";
                currentResultInput = "";
                updateUIState(data);
                render();
            } else {
                alert(data.message || "Error processing guess");
            }
        }

        function updateUIState(data) {
            remCount.textContent = data.remainingCount;
            sugList.innerHTML = "";

            if (data.suggestions.length === 0) {
                sugList.innerHTML = '<li style="color: #ef4444; font-size: 0.9rem; text-align: center; padding: 20px;">No matching words found. Check your hints!</li>';
                return;
            }

            data.suggestions.forEach((word, index) => {
                const li = document.createElement('li');
                li.className = 'suggestion-item';
                li.innerHTML = `
                    <div>
                        <div class="suggestion-word">${word}</div>
                        ${index === 0 ? '<div class="best-guess-label">Best Match</div>' : ''}
                    </div>
                `;
                li.onclick = () => {
                    navigator.clipboard.writeText(word);
                    // Visual feedback
                    li.style.background = 'var(--primary)';
                    setTimeout(() => li.style.background = '', 200);
                };
                sugList.appendChild(li);
            });
        }

        init();
    </script>
</body>

</html>
